name: Testing
on:
  pull_request:
  push:
    branches: ["*"]
    paths-ignore:
      - "*.md"
    tags-ignore: ["*"]

env:
  TEST_HOST: postgres

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres: [16, 17, 18]
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --name postgres
          --hostname postgres

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install PostgreSQL client tools
        run: |
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get update
          sudo apt-get install -y postgresql-client-${{ matrix.postgres }}

      - name: Prepare container directories and copy fixtures
        run: |
          docker exec postgres mkdir -p /data /fixtures
          docker exec postgres chmod 777 /data
          mkdir -p build/data
          docker cp fixtures/. postgres:/fixtures/

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Bootstrap environment
        run: just bootstrap
        env:
          CI: true

      - name: Copy dumps from container to workspace
        run: |
          docker cp postgres:/data/. build/data/

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test
